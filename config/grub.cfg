#
#   Make sure we load the video drivers
#
search --label --set=root MP-DATA
insmod gzio
insmod part_msdos
insmod ext2

# Define the load_video function first
function load_video {
  if [ x$feature_all_video_module = xy ]; then
    insmod all_video
  else
    insmod efi_gop
    insmod efi_uga
    insmod ieee1275_fb
    insmod vbe
    insmod vga
    insmod video_bochs
    insmod video_cirrus
  fi
}

# --- The only graphical configuration needed here is to enable the terminal and theme ---

# 1. Load the video drivers to enable graphics mode.
load_video

# 2. Set the graphics mode. This can be set here or in the theme.
set gfxmode=1024x768,800x600,640x480

# 3. Enable the graphical terminal module
insmod gfxterm
terminal_output gfxterm

# 4. Set the theme. This single command handles everything else.
set theme=($root)/boot/grub/themes/mp/theme.txt
